word: Inference vs. training
type: adjective
author: Jon Keegan
last_updated: "Last updated: March 4, 2026"
definition_list:
  - text:  >- 
      In the context of AI computing, there are two primary tasks: training and inference. 

      *Training* is when vast amounts of data are fed into an AI model during the building stage. This could be a corpus of text from books and websites, huge image datasets like XXXXX, or millions of hours of YouTube videos. The process is extremely computationally intensive, and for most of the first stage of the current generative AI boom, the industry had a simple formula: more data fed into more GPUs = a more capable model. 


      That worked for several iterations, until the massive leaps in performance started to shrink. Other techniques like reasoning models provided the next wave of breakthroughs.


      *Inference* is the process of running an AI model — ingesting a prompt, and generating a response. This is the more common mode of AI computing, as companies are not always training a big new model. Inference is less computationally intensive than trainging. 

      While the early rush to acquire as many Nvidia GPUs was focused on amassing a hoard of chips to train successive generation of models, tech companies like Google and Amazon are building custom inference chips that are far cheaper and more efficient than the most powerful GPUs needed for training. 

