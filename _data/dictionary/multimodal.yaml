word: Multimodal
type: adjective
author: Jon Keegan
last_updated: "Last updated: March 4, 2026"
definition_list:
  - text:  >- 
         A multimodal AI model is a kind of generative AI that not only can read and generate text, but also other types of media inputs such as images, sound, and video. 
         

         You might use a multimodal model to: 
          - Analyze the contents of an uploaded photo, for geolocation or other OSINT applications.
          - Generate a diagram or data visualization from a prompt.
          - Generate a video from a text prompt.
          - Generate an image from a text prompt.
          - Converse using a voice chat interface. 