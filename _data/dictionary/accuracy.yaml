word: Accuracy
type: noun
author: Libby Seline
tags:
  - Foundational concepts
definition_list:
  - text: >-
      The number of times a classification model makes a correct prediction. This is also calculated by taking 1 minus the [error rate](https://aiglossary.news/error/).


      In terms of binary classification model's [confusion matrix](https://aiglossary.news/confusion-matrix/), accuracy = TP + TN / (TP + TN + FP + FN). Although the formula for accuracy doesn't change in multiclassification models, you can learn more about using precision in multiclassification models on [Evidently AI](https://www.evidentlyai.com/classification-metrics/multi-class-metrics).


      Accuracy is a generally good metric but may not capture the model's abilities. For instance, think about a binary classification model where the output is either "cancer" or "no cancer." The model could be very good at saying there's no cancer (finding true negatives) but not good at labeling cancer (finding true positives, incorrectly making them false negatives). The accuracy metric would not necessarily capture the false negatives or instances where cancer should've been detected but was not. 


      There are other metrics used to evaluate the effectiveness of a model including [F1 Score](https://aiglossary.news/f1-score/), [recall](https://aiglossary.news/recall/), and [precision](https://aiglossary.news/precision/).
