name: Add a word
description: Suggest a new definition for inclusion
title: "Add a word"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        The process for adding a word is spelled out in [our contributor's guide](https://github.com/ryan-serpico/aiglossary.news/blob/main/CONTRIBUTING.md). Users who aren't comfortable suggesting the change via a [pull request](https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/proposing-changes-to-your-work-with-pull-requests/creating-a-pull-request) can submit their word here, where it will be reviewed by the project's maintainers.
  - type: input
    id: word
    attributes:
      label: The word
      description: What's the word you want to add?
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What kind of word is this?
      options:
        - noun
        - verb
        - adjective
        - other
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author
      description: Who wrote this entry? (e.g., your name)
    validations:
      required: true
  - type: dropdown
    id: tags
    attributes:
      label: Category
      description: Which category does this term belong to? (optional)
      options:
        - Foundational concepts
        - Reporting on AI
        - Using AI as a tool
    validations:
      required: false
  - type: input
    id: def-1
    attributes:
      label: Definition 1
      description: Succinctly define what the word means
    validations:
      required: true
  - type: input
    id: ex-1
    attributes:
      label: Example 1
      description: Illustrate the definition by providing an example of the word being used in a sentence. Please provide the text and the source URL.
    validations:
      required: true
  - type: textarea
    id: image-1
    attributes:
      label: Image (optional)
      description: >-
        If you'd like to include an image with this definition, please describe it
        here. Include: the image source URL, alt text (a description of what the
        image shows), and credit/attribution information. You can also attach an
        image file by dragging it into this text box.
      placeholder: |
        Source: https://example.com/image.png
        Alt text: A diagram showing...
        Credit: Image courtesy of...
    validations:
      required: false
  - type: input
    id: def-2
    attributes:
      label: Definition 2
      description: If the word has a second meaning, enter it here
  - type: input
    id: ex-2
    attributes:
      label: Example 2
      description: If provided, illustrate the definition by providing an example of the word being used in a sentence. Please provide the text and the source URL.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of conduct](https://github.com/ryan-serpico/aiglossary.news/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
